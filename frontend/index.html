<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NICKORP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("nickorp.theme");
          var theme =
            stored === "light" || stored === "dark" || stored === "auto"
              ? stored
              : "auto";
          var resolved =
            theme === "auto"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          var root = document.documentElement;
          if (resolved === "dark") root.classList.add("dark");
          root.dataset.theme = resolved;
          root.style.colorScheme = resolved;
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-screen flex flex-col bg-editorial-paper text-editorial-text">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
