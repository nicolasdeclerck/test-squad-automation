name: Regression Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check for recent merges on main
        id: check-merges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Checking for PRs merged on main since $SINCE"

          MERGE_COUNT=$(gh api \
            "repos/${{ github.repository }}/pulls?state=closed&base=main&sort=updated&direction=desc&per_page=100" \
            --jq "[.[] | select(.merged_at != null and .merged_at >= \"$SINCE\")] | length")

          echo "merge_count=$MERGE_COUNT" >> "$GITHUB_OUTPUT"

          if [ "$MERGE_COUNT" -eq 0 ]; then
            echo "No PRs merged on main in the last 24h. Skipping regression tests."
          else
            echo "$MERGE_COUNT PR(s) merged on main in the last 24h. Running regression tests."
          fi

      - name: Run regression tests on VPS
        id: run-tests
        if: steps.check-merges.outputs.merge_count != '0'
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker exec claude-worker git -C /workspace/test-squad-automation pull origin main
            docker exec -i -w /workspace/test-squad-automation claude-worker \
              claude -p "Exécute le skill .claude/skills/regression-tests/SKILL.md" \
              --dangerously-skip-permissions --output-format json

      - name: Handle failure (token quota or other error)
        if: steps.run-tests.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TRACKING_ISSUE=$(gh search issues "Tests de non-régression" \
            --repo ${{ github.repository }} \
            --label "non-regression tests" \
            --state open \
            --json number --jq '.[0].number // empty')

          COMMENT_BODY="## ⚠️ Exécution interrompue

          Les tests de non-régression ont été interrompus suite à une erreur (dépassement des quotas de tokens de Claude Code ou autre problème technique).

          **Date :** $(date -u '+%Y-%m-%d %H:%M UTC')

          L'exécution devra être relancée manuellement une fois le problème résolu."

          if [ -n "$TRACKING_ISSUE" ]; then
            gh issue comment "$TRACKING_ISSUE" --repo ${{ github.repository }} --body "$COMMENT_BODY"
            gh issue edit "$TRACKING_ISSUE" --repo ${{ github.repository }} --add-label "standby"
          else
            gh issue create \
              --repo ${{ github.repository }} \
              --title "Tests de non-régression — Exécution interrompue $(date -u '+%Y-%m-%d')" \
              --label "standby,non-regression tests" \
              --body "$COMMENT_BODY"
          fi
