name: Regression Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  # github.ref_name = branch selected in the "Use workflow from" dropdown
  # For schedule triggers this is the default branch (main)
  TNR_BRANCH: ${{ github.ref_name }}

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check for recent merges on main
        id: check-merges
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Checking for PRs merged on main since $SINCE"

          MERGE_COUNT=$(gh api \
            "repos/${{ github.repository }}/pulls?state=closed&base=main&sort=updated&direction=desc&per_page=100" \
            --jq "[.[] | select(.merged_at != null and .merged_at >= \"$SINCE\")] | length")

          # Manual dispatch always runs (skip merge check)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping merge check."
            echo "merge_count=1" >> "$GITHUB_OUTPUT"
          else
            echo "merge_count=$MERGE_COUNT" >> "$GITHUB_OUTPUT"
            if [ "$MERGE_COUNT" -eq 0 ]; then
              echo "No PRs merged on main in the last 24h. Skipping regression tests."
            else
              echo "$MERGE_COUNT PR(s) merged on main in the last 24h. Running regression tests."
            fi
          fi

      - name: Start ephemeral test environment
        id: start-env
        if: steps.check-merges.outputs.merge_count != '0'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd ~/test-squad-automation
            git fetch origin "${{ env.TNR_BRANCH }}"
            git checkout "${{ env.TNR_BRANCH }}"
            git pull origin "${{ env.TNR_BRANCH }}"
            ./scripts/tnr-docker.sh up
            docker network connect blog-tnr_default claude-worker || true

      - name: Verify connectivity from claude-worker to test env
        id: verify-env
        if: steps.start-env.outcome == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 3m
          script: |
            # Independent HTTP healthcheck run from the worker container so a
            # transient "env non joignable" from the skill can be diagnosed as
            # a Claude/browser problem vs. real infra breakage. Surfaces the
            # failure at the workflow level (no continue-on-error) so the
            # regression run turns red in the Actions UI instead of passing
            # silently.
            for i in $(seq 1 12); do
              if docker exec claude-worker curl -sSf --max-time 10 -o /dev/null \
                   http://blog-tnr-nginx-1:80/; then
                echo "Environment reachable from claude-worker."
                exit 0
              fi
              echo "Attempt $i/12 failed, retrying in 10s..."
              sleep 10
            done
            echo "::error::Environment not reachable from claude-worker after 12 attempts (2 min)."
            docker exec claude-worker curl -v --max-time 10 \
              http://blog-tnr-nginx-1:80/ || true
            exit 1

      - name: Run regression tests on VPS
        id: run-tests
        if: steps.verify-env.outcome == 'success'
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 60m
          script: |
            docker exec claude-worker git -C /workspace/test-squad-automation fetch origin "${{ env.TNR_BRANCH }}"
            docker exec claude-worker git -C /workspace/test-squad-automation checkout "${{ env.TNR_BRANCH }}"
            docker exec claude-worker git -C /workspace/test-squad-automation pull origin "${{ env.TNR_BRANCH }}"
            # BASE_URL/API_URL sont passés à la fois en env var (pour les
            # commandes shell du skill) ET explicitement dans le prompt, pour
            # empêcher le LLM de retomber sur un fallback documenté au lieu
            # d'évaluer la variable (cf. faux positif issue #202 où Claude
            # avait ciblé https://blog.nickorp.com).
            docker exec -i -w /workspace/test-squad-automation \
              -e BASE_URL=http://blog-tnr-nginx-1:80 \
              -e API_URL=http://blog-tnr-nginx-1:80 \
              claude-worker \
              claude -p "Exécute le skill .claude/skills/regression-tests/SKILL.md. Les URLs à cibler sont strictement BASE_URL=http://blog-tnr-nginx-1:80 et API_URL=http://blog-tnr-nginx-1:80. N'utilise jamais d'autre URL (notamment pas https://blog.nickorp.com)." \
              --dangerously-skip-permissions --output-format json

      - name: Tear down test environment
        if: always() && steps.start-env.outcome == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            docker network disconnect blog-tnr_default claude-worker || true
            cd ~/test-squad-automation
            ./scripts/tnr-docker.sh down
            git checkout main || true

      - name: Handle failure (token quota or other error)
        if: steps.run-tests.outcome == 'failure' || steps.verify-env.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERIFY_ENV_OUTCOME: ${{ steps.verify-env.outcome }}
        run: |
          TRACKING_ISSUE=$(gh search issues "Tests de non-régression" \
            --repo ${{ github.repository }} \
            --label "non-regression tests" \
            --state open \
            --json number --jq '.[0].number // empty')

          if [ "$VERIFY_ENV_OUTCOME" = "failure" ]; then
            COMMENT_BODY="## ⚠️ Environnement non joignable

          Les tests de non-régression n'ont pas pu démarrer : le healthcheck HTTP depuis \`claude-worker\` vers \`http://blog-tnr-nginx-1:80/\` a échoué après 12 tentatives (≈ 2 minutes).

          **Date :** $(date -u '+%Y-%m-%d %H:%M UTC')
          **Branche :** ${{ env.TNR_BRANCH }}
          **Run :** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          L'environnement Docker éphémère a été démarré avec succès par \`tnr-docker.sh up\` mais n'a pas répondu sur le réseau partagé. Pistes : latence de démarrage, connexion \`claude-worker\` au réseau \`blog-tnr_default\`, DNS interne Docker, configuration nginx."
            LABEL="env-unreachable"
            TITLE="Tests de non-régression — Environnement non joignable $(date -u '+%Y-%m-%d')"
          else
            COMMENT_BODY="## ⚠️ Exécution interrompue

          Les tests de non-régression ont été interrompus suite à une erreur (dépassement des quotas de tokens de Claude Code ou autre problème technique).

          **Date :** $(date -u '+%Y-%m-%d %H:%M UTC')

          L'exécution devra être relancée manuellement une fois le problème résolu."
            LABEL="standby"
            TITLE="Tests de non-régression — Exécution interrompue $(date -u '+%Y-%m-%d')"
          fi

          if [ -n "$TRACKING_ISSUE" ]; then
            gh issue comment "$TRACKING_ISSUE" --repo ${{ github.repository }} --body "$COMMENT_BODY"
            gh issue edit "$TRACKING_ISSUE" --repo ${{ github.repository }} --add-label "$LABEL"
          else
            gh issue create \
              --repo ${{ github.repository }} \
              --title "$TITLE" \
              --label "$LABEL,non-regression tests" \
              --body "$COMMENT_BODY"
          fi
