name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Django + pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: blog_db
          POSTGRES_USER: blog_user
          POSTGRES_PASSWORD: blog_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U blog_user -d blog_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://blog_user:blog_pass@localhost:5432/blog_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-only-not-for-production
      DJANGO_SETTINGS_MODULE: config.settings.development
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/development.txt

      - name: Install dependencies
        run: pip install -r requirements/development.txt

      - name: Run pytest with coverage
        # Coverage is reported but the 80% threshold from CLAUDE.md is not yet
        # enforced — flip --cov-fail-under=80 once the suite reaches the target.
        run: pytest --cov=apps --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend (Vite + Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest with coverage
        # Coverage is reported but the 80% threshold is not yet enforced — see
        # frontend/vite.config.js to flip it on once coverage reaches the target.
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: ignore
