name: Ticket Workflow

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: read

jobs:
  ticket-workflow:
    if: github.event.label.name == 'analyze'
    runs-on: ubuntu-latest
    steps:
      - name: Check Claude MAX session
        id: check-session
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 2m
          script: |
            docker exec claude-worker claude --version 2>/dev/null && echo 'SESSION_OK' || (echo 'SESSION_KO' && exit 1)

      - name: Handle session expired
        if: steps.check-session.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "## ⚠️ Session Claude MAX expirée

          La session Claude MAX sur \`claude-worker\` est expirée.

          **Renouveler avec :**
          \`\`\`bash
          ssh ubuntu@vps
          docker exec -it claude-worker claude
          \`\`\`

          Une fois renouvelée, reposer le label \`analyze\` sur ce ticket pour relancer."
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "standby" \
            --remove-label "analyze"

      - name: Run ticket-workflow Phases 1-5 (no env, STOP_BEFORE_PHASE_6)
        id: run-phases-1-5
        if: steps.check-session.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 60m
          envs: ISSUE_NUMBER,ISSUE_TITLE,ISSUE_BODY
          script: |
            set -e

            # Mettre à jour le clone interne au container claude-worker
            # pour que Claude lise le SKILL.md à jour depuis main.
            docker exec claude-worker git -C /workspace/test-squad-automation fetch origin main
            docker exec claude-worker git -C /workspace/test-squad-automation reset --hard origin/main

            # Lance Claude avec STOP_BEFORE_PHASE_6=1 → fait Phases 1-5
            # (analyse, plan, dev, code review) puis s'arrête à la frontière
            # Phase 6 (state file PHASE=6 sauvegardé pour reprise).
            # Pas de BASE_URL/API_URL : Phase 6 ne tournera pas dans ce run.
            printf 'Tu es un expert en developpement logiciel.\n\nExecutes le skill .claude/skills/ticket-workflow/SKILL.md pour le ticket #%s.\n\nTitre du ticket : %s\nDescription originale : %s' \
              "$ISSUE_NUMBER" \
              "$ISSUE_TITLE" \
              "${ISSUE_BODY:-Aucune description}" \
              | docker exec -i \
                -w /workspace/test-squad-automation \
                -e STOP_BEFORE_PHASE_6=1 \
                claude-worker \
                claude -p - --dangerously-skip-permissions --output-format json 2>&1

      - name: Run Phase 6 (browser tests) with env from PR branch
        id: run-phase-6
        if: steps.run-phases-1-5.outcome == 'success'
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 60m
          envs: ISSUE_NUMBER,ISSUE_TITLE,ISSUE_BODY
          script: |
            set -e

            STATE_FILE="/workspace/test-squad-automation-issue-${ISSUE_NUMBER}/.claude-state.json"

            # Lire l'état post-Phases-1-5 dans claude-worker pour décider
            # si Phase 6 doit tourner et sur quelle branche builder l'env.
            STATE=$(docker exec claude-worker bash -c "if [ -f $STATE_FILE ]; then python3 -c 'import json; d = json.load(open(\"$STATE_FILE\")); print(d.get(\"phase\", \"\") + \"|\" + d.get(\"branch\", \"\") + \"|\" + str(len(d.get(\"browser_tests\", []))))'; else echo '||0'; fi")

            PHASE=$(echo "$STATE" | cut -d'|' -f1)
            BRANCH=$(echo "$STATE" | cut -d'|' -f2)
            COUNT=$(echo "$STATE" | cut -d'|' -f3)

            echo "État détecté : phase=$PHASE | branch=$BRANCH | browser_tests=$COUNT"

            if [ "$PHASE" != "6" ] || [ "$COUNT" = "0" ] || [ -z "$BRANCH" ]; then
              echo "Pas de Phase 6 à exécuter (ticket terminé en Phases 1-5 ou pas de tests browser prévus)."
              exit 0
            fi

            # Build env TNR depuis la branche PR (qui existe maintenant
            # puisque Claude vient de la créer en Phase 3)
            cd ~/test-squad-automation
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            ./scripts/tnr-docker.sh up
            docker network connect blog-tnr_default claude-worker || true

            # Lance Claude une seconde fois — cette fois SANS STOP_BEFORE_PHASE_6
            # → reprend automatiquement à Phase 6 grâce au state file PHASE=6
            printf 'Tu es un expert en developpement logiciel.\n\nExecutes le skill .claude/skills/ticket-workflow/SKILL.md pour le ticket #%s.\n\nTitre du ticket : %s\nDescription originale : %s' \
              "$ISSUE_NUMBER" \
              "$ISSUE_TITLE" \
              "${ISSUE_BODY:-Aucune description}" \
              | docker exec -i \
                -w /workspace/test-squad-automation \
                -e BASE_URL=http://blog-tnr-nginx-1:80 \
                -e API_URL=http://blog-tnr-nginx-1:80 \
                claude-worker \
                claude -p - --dangerously-skip-permissions --output-format json 2>&1

      - name: Tear down test environment (idempotent)
        if: always() && steps.check-session.outcome == 'success'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            docker network disconnect blog-tnr_default claude-worker 2>/dev/null || true
            cd ~/test-squad-automation 2>/dev/null && ./scripts/tnr-docker.sh down 2>/dev/null || true

      - name: Handle workflow failure
        if: (steps.run-phases-1-5.outcome == 'failure' || steps.run-phase-6.outcome == 'failure') && steps.check-session.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "## ⚠️ Exécution ticket-workflow interrompue

          Le ticket-workflow a été interrompu (dépassement de quota Claude MAX, erreur technique, ou timeout).

          **Date :** $(date -u '+%Y-%m-%d %H:%M UTC')

          L'état est sauvegardé dans \`.claude-state.json\`. Pour relancer après résolution, reposer le label \`analyze\` sur ce ticket."
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-label "standby"
