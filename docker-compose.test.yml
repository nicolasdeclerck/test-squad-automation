# Ephemeral prod-like environment for regression tests (TNR).
# Usage: docker compose -p blog-tnr -f docker-compose.test.yml up --build -d
# Teardown: docker compose -p blog-tnr -f docker-compose.test.yml down -v

services:
  django:
    build:
      context: .
      dockerfile: docker/django/Dockerfile.prod
    env_file:
      - .env.test
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    volumes:
      - frontend_dist:/output
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/media:ro
      - frontend_dist:/app/frontend:ro
    depends_on:
      django:
        condition: service_started
      frontend:
        condition: service_completed_successfully
    restart: "no"

  postgres:
    image: postgres:16
    env_file:
      - .env.test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_test_db"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: "no"

  redis:
    image: redis:7-alpine
    restart: "no"

  celery:
    build:
      context: .
      dockerfile: docker/django/Dockerfile.prod
    command: celery -A config worker -l info
    env_file:
      - .env.test
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"

volumes:
  static_files:
  media_files:
  frontend_dist:
